syntax = "proto3";

package parking.v1;

option go_package = "github.com/YOUR_USERNAME/parking-proto/gen/parking/v1;parkingv1";

service ParkingService {
  rpc AssignSlot(AssignSlotRequest) returns (AssignSlotResponse);
  rpc ReleaseSlot(ReleaseSlotRequest) returns (Empty);
  rpc GetAvailableSlots(Empty) returns (AvailableSlotsResponse);
}

message AssignSlotRequest {
  string request_id = 1;
}

message AssignSlotResponse {
  int64 slot_id = 1;
}

message ReleaseSlotRequest {
  int64 slot_id = 1;
}

message AvailableSlotsResponse {
  int32 count = 1;
}

message Empty {}
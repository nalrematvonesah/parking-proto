syntax = "proto3";

package session.v1;

option go_package = "github.com/nalrematvonesah/parking-proto/gen/parking/v1;parkingv1";

service SessionService {
  rpc StartSession(StartRequest) returns (SessionResponse);
  rpc EndSession(EndRequest) returns (SessionResponse);
  rpc GetSession(SessionRequest) returns (SessionResponse);
  rpc CalculatePrice(SessionRequest) returns (PriceResponse);
}

message StartRequest {
  int64 vehicle_id = 1;
  string request_id = 2;
}

message EndRequest {
  int64 session_id = 1;
}

message SessionRequest {
  int64 session_id = 1;
}

message SessionResponse {
  int64 session_id = 1;
  int64 slot_id = 2;
  double amount = 3;
}

message PriceResponse {
  double amount = 1;
}